<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .file-card { transition: transform 0.2s; }
        .file-card:hover { transform: translateY(-4px); }
        .preview-container img, .preview-container video { max-height: 200px; width: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 border-b border-gray-800 pb-6">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">Repository Viewer</h1>
            <p class="text-gray-400 mt-2">Static file explorer via GitHub Actions</p>
        </header>

        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        async function loadFiles() {
            const response = await fetch('files.json');
            const files = await response.json();
            const gallery = document.getElementById('gallery');

            files.forEach(path => {
                const card = document.createElement('div');
                card.className = "file-card bg-gray-800 rounded-xl overflow-hidden border border-gray-700 shadow-lg";
                card.innerHTML = `
                    <div class="preview-container bg-black flex items-center justify-center min-h-[150px]" data-path="${path}">
                        <span class="text-gray-500 italic text-sm">Loading preview...</span>
                    </div>
                    <div class="p-4">
                        <p class="text-xs text-blue-400 font-mono truncate">${path}</p>
                        <a href="${path}" download class="mt-3 inline-block text-xs font-semibold text-gray-300 hover:text-white">Download →</a>
                    </div>
                `;
                gallery.appendChild(card);
                observer.observe(card.querySelector('.preview-container'));
            });
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    renderPreview(entry.target);
                    observer.unobserve(entry.target);
                }
            });
        }, { rootMargin: '50px' });

        function renderPreview(container) {
            const path = container.dataset.path;
            const ext = path.split('.').pop().toLowerCase();
            
            if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext)) {
                container.innerHTML = `<img src="${path}" loading="lazy">`;
            } else if (['mp4', 'webm', 'ogg'].includes(ext)) {
                container.innerHTML = `<video muted controls class="w-full"><source src="${path}" type="video/${ext}"></video>`;
            } else if (['mp3', 'wav'].includes(ext)) {
                container.innerHTML = `<audio controls class="w-full px-2"><source src="${path}" type="audio/${ext}"></audio>`;
            } else {
                // Text/Code Preview
                fetch(path).then(res => res.text()).then(text => {
                    const snippet = text.substring(0, 200).replace(/</g, "&lt;");
                    container.innerHTML = `<pre class="text-[10px] p-4 text-gray-400 overflow-hidden w-full h-full"><code>${snippet}...</code></pre>`;
                }).catch(() => {
                    container.innerHTML = `<div class="p-4 text-gray-600">No preview available</div>`;
                });
            }
        }

        loadFiles();
    </script>
</body>
</html>
