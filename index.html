<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoFlow | File Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <style>
        :root {
            --bg: #0b0f1a; --sidebar-bg: #151b2b; --card-bg: #1e2538;
            --text: #e2e8f0; --text-dim: #94a3b8; --accent: #3b82f6;
            --border: #2d3748; --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Sidebar & Search */
        #sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .search-box { padding: 1.5rem 1rem; border-bottom: 1px solid var(--border); }
        #search-input { width: 100%; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: #fff; outline: none; }
        #search-input:focus { border-color: var(--accent); }
        #tree-root { flex-grow: 1; overflow-y: auto; padding: 1rem; font-size: 0.9rem; }
        
        /* Main Panel */
        #main-panel { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #top-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; background: var(--sidebar-bg); border-bottom: 1px solid var(--border); }
        #breadcrumbs { display: flex; gap: 0.5rem; align-items: center; font-weight: 500; }
        .breadcrumb-part { cursor: pointer; color: var(--text-dim); transition: 0.2s; }
        .breadcrumb-part:hover { color: var(--accent); }

        /* Content Areas */
        #view-content { flex-grow: 1; overflow-y: auto; padding: 2rem; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; }
        .grid-item { background: var(--card-bg); border: 1px solid var(--border); padding: 1.5rem; border-radius: var(--radius); text-align: center; cursor: pointer; transition: 0.2s; }
        .grid-item:hover { transform: translateY(-4px); border-color: var(--accent); background: #252d42; }
        .grid-item .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .grid-item .name { font-size: 0.85rem; word-break: break-all; font-weight: 500; }

        /* Preview Components */
        .preview-header { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: center; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
        
        pre, .markdown-body { background: var(--card-bg); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); line-height: 1.6; }
        video, img { max-width: 100%; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Playlist View */
        .playlist-container { display: grid; grid-template-columns: 1fr 300px; gap: 1rem; }
        .track-list { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; }
        .track-item { padding: 0.8rem; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.85rem; }
        .track-item:hover { background: var(--accent); color: white; }
        .track-item.active { background: var(--accent); font-weight: bold; }

        /* Tree UI Classes */
        .tree-folder { cursor: pointer; padding: 4px 8px; border-radius: 4px; display: block; }
        .tree-folder:hover { background: var(--card-bg); }
        .tree-file { cursor: pointer; padding: 4px 8px 4px 24px; color: var(--text-dim); border-radius: 4px; display: block; }
        .tree-file:hover { color: var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Search repository...">
    </div>
    <div id="tree-root"></div>
</div>

<div id="main-panel">
    <div id="top-nav">
        <div id="breadcrumbs"></div>
        <div id="nav-actions"></div>
    </div>
    <div id="view-content"></div>
</div>

<script>
    let repositoryTree = [];
    let currentPath = [];
    let audioCtx, compressor;
    let currentHls = null;

    // --- initialization ---
    fetch('tree.json').then(r => r.json()).then(data => {
        repositoryTree = data;
        renderTree(data, document.getElementById('tree-root'));
        showFolderContents(data, 'Root');
    });

    // --- Search Logic ---
    document.getElementById('search-input').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.tree-node').forEach(node => {
            const match = node.dataset.name.toLowerCase().includes(val);
            node.classList.toggle('hidden', !match && val !== '');
        });
    };

    // --- Navigation & UI Generators ---
    function renderTree(nodes, container, level = 0) {
        nodes.forEach(node => {
            const div = document.createElement('div');
            div.className = 'tree-node';
            div.dataset.name = node.name;
            
            if (node.type === 'folder') {
                const title = document.createElement('span');
                title.className = 'tree-folder';
                title.innerHTML = `📁 ${node.name}`;
                title.onclick = () => showFolderContents(node.children, node.name);
                div.appendChild(title);
                
                const childContainer = document.createElement('div');
                childContainer.style.marginLeft = '12px';
                renderTree(node.children, childContainer, level + 1);
                div.appendChild(childContainer);
            } else {
                const file = document.createElement('span');
                file.className = 'tree-file';
                file.innerHTML = `📄 ${node.name}`;
                file.onclick = () => previewFile(node);
                div.appendChild(file);
            }
            container.appendChild(div);
        });
    }

    function showFolderContents(files, folderName) {
        updateBreadcrumbs(folderName);
        const container = document.getElementById('view-content');
        container.innerHTML = '<div class="grid-view"></div>';
        const grid = container.querySelector('.grid-view');

        files.forEach(file => {
            const card = document.createElement('div');
            card.className = 'grid-item';
            card.innerHTML = `
                <div class="icon">${file.type === 'folder' ? '📂' : getFileEmoji(file.ext)}</div>
                <div class="name">${file.name}</div>
            `;
            card.onclick = () => file.type === 'folder' ? showFolderContents(file.children, file.name) : previewFile(file);
            grid.appendChild(card);
        });
    }

    function updateBreadcrumbs(currentName) {
        const bc = document.getElementById('breadcrumbs');
        bc.innerHTML = `<span class="breadcrumb-part" onclick="location.reload()">Root</span> / ${currentName}`;
    }

    function getFileEmoji(ext) {
        if (['.mp3', '.wav', '.flac'].includes(ext)) return '🎵';
        if (['.mp4', '.mkv', '.webm'].includes(ext)) return '🎬';
        if (['.m3u', '.m3u8'].includes(ext)) return '📻';
        if (['.jpg', '.png', '.gif', '.svg'].includes(ext)) return '🖼️';
        if (ext === '.md') return '📝';
        return '📄';
    }

    // --- Preview Logic ---
    async function previewFile(node) {
        const container = document.getElementById('view-content');
        const actions = document.getElementById('nav-actions');
        container.innerHTML = '<p>Loading...</p>';
        actions.innerHTML = `<a href="${node.path}" download class="btn btn-secondary">Download</a>`;

        if (currentHls) currentHls.destroy();

        const ext = node.ext;
        const url = node.path;

        if (['.jpg', '.png', '.gif', '.webp', '.svg'].includes(ext)) {
            container.innerHTML = `<img src="${url}">`;
        } 
        else if (['.mp4', '.webm', '.ogg'].includes(ext)) {
            renderPlayer(url, 'video');
        }
        else if (['.mp3', '.wav', '.flac'].includes(ext)) {
            renderPlayer(url, 'audio');
        }
        else if (ext === '.m3u' || ext === '.m3u8') {
            handlePlaylist(node);
        }
        else if (ext === '.md') {
            const txt = await (await fetch(url)).text();
            container.innerHTML = `<div class="markdown-body">${marked.parse(txt)}</div>`;
        }
        else {
            const txt = await (await fetch(url)).text();
            container.innerHTML = `<pre><code class="language-${ext.slice(1)}">${escapeHTML(txt)}</code></pre>`;
            Prism.highlightAll();
        }
    }

    // --- Media & HLS Engine ---
    function renderPlayer(url, type) {
        const container = document.getElementById('view-content');
        container.innerHTML = '';
        const el = document.createElement(type);
        el.src = url;
        el.controls = true;
        el.volume = 0.5;
        el.style.width = '100%';
        container.appendChild(el);
        setupAudioNormalization(el);
    }

    async function handlePlaylist(node) {
        const container = document.getElementById('view-content');
        const actions = document.getElementById('nav-actions');
        
        // Default View: Text
        const content = await (await fetch(node.path)).text();
        container.innerHTML = `
            <div class="preview-header">
                <h3>Playlist: ${node.name}</h3>
                <button class="btn btn-primary" id="play-stream-btn">▶️ Play Stream</button>
            </div>
            <pre><code>${escapeHTML(content)}</code></pre>
        `;

        document.getElementById('play-stream-btn').onclick = () => {
            if (node.ext === '.m3u8') startHls(node.path);
            else parseM3U(content);
        };
    }

    function startHls(url) {
        const container = document.getElementById('view-content');
        container.innerHTML = '<video id="video-player" controls style="width:100%"></video>';
        const video = document.getElementById('video-player');
        video.volume = 0.5;
        
        if (Hls.isSupported()) {
            currentHls = new Hls();
            currentHls.loadSource(url);
            currentHls.attachMedia(video);
            currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
        }
        setupAudioNormalization(video);
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        const tracks = [];
        let currentTitle = "Unknown";
        lines.forEach(line => {
            if (line.startsWith('#EXTINF')) currentTitle = line.split(',')[1] || "Unknown";
            else if (line.trim() && !line.startsWith('#')) tracks.push({ title: currentTitle, url: line.trim() });
        });

        const container = document.getElementById('view-content');
        container.innerHTML = `
            <div class="playlist-container">
                <div id="media-host"></div>
                <div class="track-list" id="tracks"></div>
            </div>
        `;
        
        const host = document.getElementById('media-host');
        const player = document.createElement('audio');
        player.controls = true; player.volume = 0.5; player.style.width = '100%';
        host.appendChild(player);

        const list = document.getElementById('tracks');
        tracks.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerText = `${i+1}. ${t.title}`;
            div.onclick = () => {
                player.src = t.url;
                player.play();
                document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
            };
            list.appendChild(div);
        });
        setupAudioNormalization(player);
    }

    function setupAudioNormalization(mediaElement) {
        mediaElement.onplay = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                compressor = audioCtx.createDynamicsCompressor();
                compressor.threshold.setValueAtTime(-24, audioCtx.currentTime);
                compressor.knee.setValueAtTime(30, audioCtx.currentTime);
                compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
                compressor.attack.setValueAtTime(0.003, audioCtx.currentTime);
                compressor.release.setValueAtTime(0.25, audioCtx.currentTime);
                compressor.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            try {
                const source = audioCtx.createMediaElementSource(mediaElement);
                source.connect(compressor);
            } catch(e) {} // Avoid re-connecting error
        };
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]));
    }
</script>
</body>
</html>
