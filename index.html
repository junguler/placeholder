<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Explorer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .tree-item:hover { background: #1f2937; }
        .modal-bg { backdrop-filter: blur(8px); }
        .folder-content { display: none; margin-left: 1.25rem; border-left: 1px solid #374151; }
        .folder-open > .folder-content { display: block; }
    </style>
</head>
<body class="bg-[#0d1117] text-gray-300 h-screen flex overflow-hidden font-sans">

    <aside class="w-72 border-r border-gray-800 flex flex-col flex-shrink-0">
        <div class="p-4 border-b border-gray-800">
            <h2 class="font-bold text-white flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                Explorer
            </h2>
        </div>
        <div id="tree-container" class="flex-1 overflow-y-auto p-2 text-sm">
            <div class="animate-pulse p-4">Loading tree...</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col items-center justify-center p-10 relative">
        <div id="empty-state" class="text-center">
            <svg class="w-16 h-16 text-gray-700 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            <p class="text-gray-500">Select a file from the sidebar to preview</p>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-10 modal-bg bg-black/60">
        <div class="bg-[#161b22] w-full max-w-5xl max-h-full rounded-xl border border-gray-700 shadow-2xl flex flex-col overflow-hidden">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0d1117]">
                <span id="modal-title" class="text-sm font-mono text-blue-400 truncate pr-4"></span>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="modal-body" class="flex-1 overflow-auto bg-[#0d1117] flex items-center justify-center p-4">
                </div>
        </div>
    </div>

    <script>
        const treeContainer = document.getElementById('tree-container');
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');
        const modalTitle = document.getElementById('modal-title');

        async function init() {
            const res = await fetch('files.json');
            const data = await res.json();
            treeContainer.innerHTML = '';
            data.forEach(node => treeContainer.appendChild(createTreeNode(node)));
        }

        function createTreeNode(node) {
            const div = document.createElement('div');
            const isFolder = node.type === 'folder';
            
            div.className = `tree-item rounded-md transition-colors cursor-pointer`;
            div.innerHTML = `
                <div class="flex items-center gap-2 py-1 px-2">
                    <span class="w-4 h-4 text-gray-500">
                        ${isFolder ? '▶' : '📄'}
                    </span>
                    <span class="truncate">${node.name}</span>
                </div>
                ${isFolder ? `<div class="folder-content"></div>` : ''}
            `;

            if (isFolder) {
                const head = div.querySelector('div');
                const content = div.querySelector('.folder-content');
                head.onclick = (e) => {
                    e.stopPropagation();
                    div.classList.toggle('folder-open');
                    head.querySelector('span').innerText = div.classList.contains('folder-open') ? '▼' : '▶';
                    if (content.children.length === 0) {
                        node.children.forEach(child => content.appendChild(createTreeNode(child)));
                    }
                };
            } else {
                div.onclick = () => openPreview(node.path, node.name);
            }
            return div;
        }

        function openPreview(path, name) {
            modal.classList.remove('hidden');
            modalTitle.innerText = path;
            modalBody.innerHTML = '<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>';
            
            const ext = name.split('.').pop().toLowerCase();
            const images = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'];
            const videos = ['mp4', 'webm'];
            const audio = ['mp3', 'wav'];

            if (images.includes(ext)) {
                modalBody.innerHTML = `<img src="${path}" class="max-w-full max-h-full object-contain shadow-lg">`;
            } else if (videos.includes(ext)) {
                modalBody.innerHTML = `<video controls autoplay class="max-w-full max-h-full"><source src="${path}"></video>`;
            } else if (audio.includes(ext)) {
                modalBody.innerHTML = `<div class="bg-gray-800 p-8 rounded-lg w-full max-w-md text-center">
                    <p class="mb-4 text-sm">${name}</p>
                    <audio controls class="w-full"><source src="${path}"></audio>
                </div>`;
            } else {
                fetch(path).then(r => r.text()).then(txt => {
                    const safeTxt = txt.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    modalBody.innerHTML = `<pre class="w-full h-full p-4 text-xs font-mono leading-relaxed text-gray-400"><code>${safeTxt}</code></pre>`;
                }).catch(() => {
                    modalBody.innerHTML = `<div class="text-red-400">Error loading file content.</div>`;
                });
            }
        }

        function closeModal() {
            modal.classList.add('hidden');
            modalBody.innerHTML = '';
        }

        // Close on escape key
        window.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
        
        init();
    </script>
</body>
</html>
