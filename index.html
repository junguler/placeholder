<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root {
            --bg: #0f172a; --bg-panel: #1e293b; --text: #f8fafc;
            --accent: #3b82f6; --hover: #334155; --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Sidebar (File Tree) */
        #sidebar { width: 300px; background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 1rem; flex-shrink: 0; }
        .folder-name { font-weight: bold; margin-top: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .folder-name::before { content: '📁'; }
        .file-name { margin-left: 1.5rem; padding: 0.25rem 0.5rem; cursor: pointer; border-radius: 4px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-name:hover { background: var(--hover); color: var(--accent); }
        .children { margin-left: 0.5rem; border-left: 1px solid var(--border); padding-left: 0.5rem; }
        .collapsed { display: none; }
        
        /* Main Preview Area */
        #main { flex-grow: 1; display: flex; flex-direction: column; padding: 2rem; overflow-y: auto; position: relative; }
        #preview-container { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
        
        /* Media Elements */
        img, video { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); background: #000; }
        audio { width: 100%; margin-top: 1rem; }
        pre { background: var(--bg-panel); padding: 1rem; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; font-family: monospace; border: 1px solid var(--border); }
        
        /* Playlist UI */
        #playlist-ui { background: var(--bg-panel); border-radius: 8px; border: 1px solid var(--border); padding: 1rem; display: none; margin-top: 1rem; }
        .playlist-track { padding: 0.5rem; cursor: pointer; border-radius: 4px; border-bottom: 1px solid var(--border); }
        .playlist-track:hover { background: var(--hover); }
        .playlist-track.active { color: var(--accent); font-weight: bold; }
        
        .loading { color: var(--accent); font-style: italic; }
    </style>
</head>
<body>

    <div id="sidebar"></div>
    <div id="main">
        <h2 id="file-title" style="margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Select a file to preview</h2>
        <div id="preview-container"></div>
        
        <div id="playlist-ui">
            <h3>Playlist</h3>
            <div id="playlist-tracks"></div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const previewContainer = document.getElementById('preview-container');
        const fileTitle = document.getElementById('file-title');
        const playlistUI = document.getElementById('playlist-ui');
        const playlistTracks = document.getElementById('playlist-tracks');
        
        let audioCtx, compressor;
        let currentHls = null;

        // --- 1. Load Tree ---
        fetch('./tree.json')
            .then(res => res.json())
            .then(data => {
                sidebar.appendChild(buildTree(data));
            })
            .catch(err => {
                sidebar.innerHTML = '<p style="color:red">Failed to load tree.json. Did the GitHub Action run?</p>';
            });

        function buildTree(nodes) {
            const container = document.createElement('div');
            nodes.forEach(node => {
                if (node.type === 'folder') {
                    const wrapper = document.createElement('div');
                    const title = document.createElement('div');
                    title.className = 'folder-name';
                    title.innerText = node.name;
                    
                    const childrenWrap = document.createElement('div');
                    childrenWrap.className = 'children collapsed';
                    childrenWrap.appendChild(buildTree(node.children));
                    
                    title.onclick = () => childrenWrap.classList.toggle('collapsed');
                    
                    wrapper.appendChild(title);
                    wrapper.appendChild(childrenWrap);
                    container.appendChild(wrapper);
                } else {
                    const file = document.createElement('div');
                    file.className = 'file-name';
                    file.innerText = '📄 ' + node.name;
                    file.onclick = () => previewFile(node);
                    container.appendChild(file);
                }
            });
            return container;
        }

        // --- 2. Preview Logic ---
        function previewFile(node) {
            fileTitle.innerText = node.path;
            previewContainer.innerHTML = '';
            playlistUI.style.display = 'none';
            if (currentHls) currentHls.destroy();

            const ext = node.ext;
            const url = `./${node.path}`;

            const images = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg'];
            const videos = ['.mp4', '.webm', '.ogg'];
            const audios = ['.mp3', '.wav', '.flac'];

            if (images.includes(ext)) {
                previewContainer.innerHTML = `<img src="${url}" loading="lazy" alt="${node.name}">`;
            } 
            else if (videos.includes(ext)) {
                renderMedia(url, 'video');
            } 
            else if (audios.includes(ext)) {
                renderMedia(url, 'audio');
            } 
            else if (ext === '.m3u8') {
                renderHLS(url);
            }
            else if (ext === '.m3u') {
                parseAndRenderM3U(url);
            }
            else {
                // Fallback to text for anything else (source code, logs, etc.)
                previewContainer.innerHTML = '<div class="loading">Loading text content...</div>';
                fetch(url)
                    .then(res => res.text())
                    .then(text => {
                        previewContainer.innerHTML = `<pre><code>${escapeHTML(text)}</code></pre>`;
                    })
                    .catch(() => {
                        previewContainer.innerHTML = '<p>Unable to preview this file type.</p>';
                    });
            }
        }

        // --- 3. Media Rendering & Audio Normalization ---
        function renderMedia(url, tag) {
            const media = document.createElement(tag);
            media.src = url;
            media.controls = true;
            media.volume = 0.5; // Starts at 50%
            media.style.width = '100%';
            
            media.addEventListener('play', () => setupAudioNormalization(media), { once: true });
            previewContainer.appendChild(media);
        }

        function renderHLS(url) {
            const video = document.createElement('video');
            video.controls = true;
            video.volume = 0.5;
            video.style.width = '100%';
            previewContainer.appendChild(video);

            if (Hls.isSupported()) {
                currentHls = new Hls();
                currentHls.loadSource(url);
                currentHls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Fallback for Safari
                video.src = url;
            }
            video.addEventListener('play', () => setupAudioNormalization(video), { once: true });
        }

        // Applies DynamicsCompressor to normalize volume differences
        function setupAudioNormalization(mediaElement) {
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                    compressor = audioCtx.createDynamicsCompressor();
                    compressor.threshold.setValueAtTime(-24, audioCtx.currentTime);
                    compressor.knee.setValueAtTime(30, audioCtx.currentTime);
                    compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
                    compressor.attack.setValueAtTime(0.003, audioCtx.currentTime);
                    compressor.release.setValueAtTime(0.25, audioCtx.currentTime);
                    compressor.connect(audioCtx.destination);
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                // Avoid reconnecting the same element twice
                if (!mediaElement._isNormalized) {
                    const source = audioCtx.createMediaElementSource(mediaElement);
                    source.connect(compressor);
                    mediaElement._isNormalized = true;
                }
            } catch (e) {
                console.warn("Audio normalization skipped (often due to CORS on external streams).", e);
            }
        }

        // --- 4. M3U Playlist Parsing ---
        async function parseAndRenderM3U(url) {
            try {
                const res = await fetch(url);
                const text = await res.text();
                const lines = text.split('\n');
                
                let tracks = [];
                let currentTitle = "Unknown Track";

                lines.forEach(line => {
                    line = line.trim();
                    if (!line) return;
                    
                    if (line.startsWith('#EXTINF')) {
                        const parts = line.split(',');
                        currentTitle = parts[1] ? parts[1].trim() : "Unknown Track";
                    } else if (!line.startsWith('#')) {
                        // It's a URL
                        tracks.push({ title: currentTitle, url: line });
                        currentTitle = "Unknown Track"; // reset
                    }
                });

                if (tracks.length > 0) {
                    buildPlaylistUI(tracks);
                } else {
                    previewContainer.innerHTML = '<p>Playlist is empty or invalid.</p>';
                }

            } catch (e) {
                previewContainer.innerHTML = '<p>Failed to load playlist.</p>';
            }
        }

        function buildPlaylistUI(tracks) {
            playlistUI.style.display = 'block';
            playlistTracks.innerHTML = '';
            
            // Create a main audio element for the playlist
            previewContainer.innerHTML = '';
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.volume = 0.5;
            audio.addEventListener('play', () => setupAudioNormalization(audio), { once: true });
            previewContainer.appendChild(audio);

            let currentIndex = 0;

            const playTrack = (index) => {
                document.querySelectorAll('.playlist-track').forEach(el => el.classList.remove('active'));
                playlistTracks.children[index].classList.add('active');
                
                // Check if track is a stream (m3u8) inside the playlist
                if (tracks[index].url.endsWith('.m3u8')) {
                   renderHLS(tracks[index].url); // Note: this replaces the audio tag with video tag
                } else {
                   audio.src = tracks[index].url;
                   audio.play();
                }
            };

            tracks.forEach((track, index) => {
                const el = document.createElement('div');
                el.className = 'playlist-track';
                el.innerText = `${index + 1}. ${track.title}`;
                el.onclick = () => { currentIndex = index; playTrack(currentIndex); };
                playlistTracks.appendChild(el);
            });

            // Auto-play next track
            audio.addEventListener('ended', () => {
                if (currentIndex < tracks.length - 1) {
                    currentIndex++;
                    playTrack(currentIndex);
                }
            });

            playTrack(0);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
