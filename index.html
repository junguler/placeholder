<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --bg-hover: #292e36;
    --bg-active: #1f6feb22;
    --border: #30363d;
    --border-light: #3d444d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #656d76;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --accent-dim: #1f6feb;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --pink: #f778ba;
    --cyan: #39d2c0;
    --scrollbar-bg: #161b22;
    --scrollbar-thumb: #30363d;
    --shadow: 0 8px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
    --radius: 8px;
    --radius-lg: 12px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { font-size: 14px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    overflow: hidden;
    height: 100vh;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar-bg); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

  .app { display: flex; height: 100vh; flex-direction: column; }

  /* Top Bar */
  .topbar {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text-primary);
    flex-shrink: 0;
  }

  .topbar-logo svg { flex-shrink: 0; }

  .search-container {
    flex: 1;
    max-width: 560px;
    position: relative;
  }

  .search-container input {
    width: 100%;
    padding: 7px 12px 7px 36px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 0.93rem;
    outline: none;
    transition: border var(--transition), box-shadow var(--transition);
  }

  .search-container input:focus {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.2);
  }

  .search-container input::placeholder { color: var(--text-muted); }

  .search-container .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .topbar-stats {
    display: flex;
    gap: 16px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .topbar-stats span { white-space: nowrap; }

  .stat-num {
    font-weight: 600;
    color: var(--text-primary);
  }

  /* Layout */
  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 300px;
    min-width: 240px;
    max-width: 500px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    transition: width var(--transition);
  }

  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-header h2 {
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
  }

  .sidebar-toggle {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: color var(--transition), background var(--transition);
    display: flex;
    align-items: center;
  }

  .sidebar-toggle:hover {
    color: var(--text-primary);
    background: var(--bg-tertiary);
  }

  .tree-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .tree-item {
    display: flex;
    align-items: center;
    padding: 4px 16px;
    cursor: pointer;
    gap: 6px;
    font-size: 0.9rem;
    color: var(--text-primary);
    transition: background var(--transition);
    user-select: none;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    border-left: 2px solid transparent;
  }

  .tree-item:hover { background: var(--bg-hover); }
  .tree-item.active {
    background: var(--bg-active);
    border-left-color: var(--accent);
  }

  .tree-item .indent {
    flex-shrink: 0;
  }

  .tree-item .icon {
    flex-shrink: 0;
    width: 18px;
    text-align: center;
    font-size: 0.85rem;
  }

  .tree-item .name {
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tree-dir > .icon { color: var(--accent); }
  .tree-file.type-image > .icon { color: var(--purple); }
  .tree-file.type-audio > .icon { color: var(--pink); }
  .tree-file.type-video > .icon { color: var(--red); }
  .tree-file.type-pdf > .icon { color: var(--orange); }
  .tree-file.type-font > .icon { color: var(--cyan); }
  .tree-file.type-text > .icon { color: var(--text-secondary); }
  .tree-file.type-binary > .icon { color: var(--text-muted); }

  .dir-chevron {
    flex-shrink: 0;
    transition: transform 0.15s ease;
    color: var(--text-muted);
  }

  .dir-chevron.open { transform: rotate(90deg); }

  /* Content */
  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .breadcrumb {
    padding: 10px 24px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    flex-wrap: wrap;
    min-height: 42px;
  }

  .breadcrumb-item {
    color: var(--accent);
    cursor: pointer;
    transition: color var(--transition);
  }

  .breadcrumb-item:hover { color: var(--accent-hover); text-decoration: underline; }
  .breadcrumb-sep { color: var(--text-muted); }
  .breadcrumb-current { color: var(--text-primary); font-weight: 600; }

  .viewer {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .viewer-inner {
    width: 100%;
    max-width: 1200px;
  }

  /* Welcome Screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: var(--text-secondary);
    gap: 16px;
    padding: 40px;
  }

  .welcome svg { opacity: 0.3; }
  .welcome h2 { font-size: 1.5rem; color: var(--text-primary); font-weight: 600; }
  .welcome p { font-size: 1rem; max-width: 400px; }

  /* File Header */
  .file-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    flex-wrap: wrap;
    gap: 8px;
  }

  .file-header-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
  }

  .file-header-info .file-icon { font-size: 1.1rem; }
  .file-header-info .file-name { font-weight: 600; }
  .file-header-info .file-meta { color: var(--text-secondary); }

  .file-header-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: background var(--transition), border-color var(--transition);
    text-decoration: none;
  }

  .btn:hover {
    background: var(--bg-hover);
    border-color: var(--border-light);
  }

  .btn-primary {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* Code Viewer */
  .code-viewer {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    overflow: auto;
    max-height: calc(100vh - 220px);
  }

  .code-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.55;
    tab-size: 4;
  }

  .code-table td {
    padding: 0 16px;
    vertical-align: top;
    white-space: pre;
  }

  .code-table .line-num {
    width: 1%;
    min-width: 50px;
    padding: 0 12px;
    text-align: right;
    color: var(--text-muted);
    user-select: none;
    border-right: 1px solid var(--border);
    position: sticky;
    left: 0;
    background: var(--bg-primary);
  }

  .code-table .line-content {
    padding-left: 16px;
  }

  .code-table tr:hover { background: var(--bg-hover); }

  /* Media Viewers */
  .media-viewer {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    padding: 32px;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 300px;
  }

  .media-viewer img {
    max-width: 100%;
    max-height: calc(100vh - 280px);
    border-radius: var(--radius);
    object-fit: contain;
    background-image:
      linear-gradient(45deg, #1a1e24 25%, transparent 25%),
      linear-gradient(-45deg, #1a1e24 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1e24 75%),
      linear-gradient(-45deg, transparent 75%, #1a1e24 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
  }

  .media-viewer audio {
    width: 100%;
    max-width: 500px;
    border-radius: var(--radius);
  }

  .media-viewer video {
    max-width: 100%;
    max-height: calc(100vh - 280px);
    border-radius: var(--radius);
  }

  .media-viewer iframe {
    width: 100%;
    height: calc(100vh - 280px);
    min-height: 500px;
    border: none;
    border-radius: var(--radius);
  }

  /* Binary Info */
  .binary-info {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    padding: 48px 32px;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
    color: var(--text-secondary);
  }

  .binary-info .binary-icon { font-size: 3rem; opacity: 0.4; }
  .binary-info p { max-width: 400px; }

  /* Font Preview */
  .font-preview {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    padding: 32px;
    background: var(--bg-primary);
    text-align: center;
  }

  .font-preview-sample {
    font-size: 3rem;
    margin: 24px 0;
    line-height: 1.4;
    word-break: break-word;
  }

  .font-preview-sizes {
    text-align: left;
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .font-size-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .font-size-label {
    flex-shrink: 0;
    width: 50px;
    text-align: right;
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  /* Directory View */
  .dir-listing {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg-secondary);
  }

  .dir-listing-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text-secondary);
    display: flex;
    gap: 16px;
  }

  .dir-listing-row {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background var(--transition);
  }

  .dir-listing-row:last-child { border-bottom: none; }
  .dir-listing-row:hover { background: var(--bg-hover); }

  .dir-listing-row .row-icon { width: 20px; text-align: center; flex-shrink: 0; }
  .dir-listing-row .row-name { flex: 1; color: var(--accent); }
  .dir-listing-row .row-name:hover { text-decoration: underline; }
  .dir-listing-row .row-size { color: var(--text-secondary); font-size: 0.82rem; width: 80px; text-align: right; }
  .dir-listing-row .row-type { color: var(--text-muted); font-size: 0.82rem; width: 60px; text-align: right; }

  .dir-listing-row.is-dir .row-icon { color: var(--accent); }
  .dir-listing-row.is-dir .row-name { font-weight: 500; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-secondary);
    gap: 12px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-msg {
    padding: 32px;
    text-align: center;
    color: var(--red);
  }

  /* Resize Handle */
  .resize-handle {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    transition: background var(--transition);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .resize-handle:hover,
  .resize-handle.active {
    background: var(--accent-dim);
  }

  /* Line highlighting */
  .code-table tr.highlighted {
    background: rgba(31, 111, 235, 0.15);
  }

  .code-table .line-num.highlighted-num {
    color: var(--accent);
    font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { width: 100%; max-width: none; position: absolute; z-index: 50; height: calc(100vh - 53px); top: 53px; left: 0; transform: translateX(-100%); transition: transform 0.3s ease; }
    .sidebar.mobile-open { transform: translateX(0); }
    .resize-handle { display: none; }
    .topbar-stats { display: none; }
    .viewer { padding: 16px; }
    .mobile-menu-btn { display: flex !important; }
  }

  @media (min-width: 769px) {
    .mobile-menu-btn { display: none !important; }
  }

  .mobile-menu-btn {
    background: none;
    border: none;
    color: var(--text-primary);
    cursor: pointer;
    padding: 4px;
    display: none;
    align-items: center;
  }

  .fade-in {
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Image zoom */
  .zoomable-img { cursor: zoom-in; transition: transform 0.3s ease; }
  .img-zoomed { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; cursor: zoom-out; padding: 20px; }
  .img-zoomed img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: var(--radius); }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M1 2.75A.75.75 0 011.75 2h12.5a.75.75 0 110 1.5H1.75A.75.75 0 011 2.75zm0 5A.75.75 0 011.75 7h12.5a.75.75 0 110 1.5H1.75A.75.75 0 011 7.75zM1.75 12a.75.75 0 100 1.5h12.5a.75.75 0 100-1.5H1.75z"/></svg>
    </button>
    <div class="topbar-logo">
      <svg height="28" viewBox="0 0 16 16" width="28" fill="#e6edf3"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>
      <span>File Viewer</span>
    </div>
    <div class="search-container">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M11.5 7a4.499 4.499 0 11-8.998 0A4.499 4.499 0 0111.5 7zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"/></svg>
      </span>
      <input type="text" id="searchInput" placeholder="Search files..." autocomplete="off" />
    </div>
    <div class="topbar-stats" id="topbarStats"></div>
  </div>

  <div class="main-layout">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Explorer</h2>
        <button class="sidebar-toggle" onclick="collapseSidebar()" title="Collapse sidebar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M7.78 12.53a.75.75 0 01-1.06 0L2.47 8.28a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 1.06L4.81 7h7.44a.75.75 0 010 1.5H4.81l2.97 2.97a.75.75 0 010 1.06z"/></svg>
        </button>
      </div>
      <div class="tree-container" id="treeContainer"></div>
    </div>

    <div class="resize-handle" id="resizeHandle"></div>

    <div class="content-area">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="viewer" id="viewer">
        <div class="welcome">
          <svg width="64" height="64" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0113.25 16h-9.5A1.75 1.75 0 012 14.25Zm1.75-.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 00.25-.25V6h-2.75A1.75 1.75 0 019 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>
          <h2>Welcome to File Viewer</h2>
          <p>Select a file from the sidebar to preview it, or use the search bar to find files.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  let FILES = [];
  let TREE = {};
  let currentPath = null;
  let expandedDirs = new Set();
  let searchTimeout = null;

  const BASE_URL = getBaseUrl();

  function getBaseUrl() {
    const path = window.location.pathname;
    if (path.endsWith('/')) return path;
    if (path.endsWith('.html')) return path.substring(0, path.lastIndexOf('/') + 1);
    return path + '/';
  }

  async function init() {
    try {
      const res = await fetch(BASE_URL + 'file_index.json');
      if (!res.ok) throw new Error('Could not load file index');
      FILES = await res.json();
      buildTree();
      renderStats();
      renderTree();
      handleHashNavigation();
      setupSearch();
      setupResize();
      window.addEventListener('hashchange', handleHashNavigation);
    } catch (err) {
      document.getElementById('viewer').innerHTML =
        `<div class="error-msg"><p>Error loading file index: ${err.message}</p><p>Make sure the GitHub Actions workflow has run successfully.</p></div>`;
    }
  }

  function buildTree() {
    TREE = { __files: [], __dirs: {} };
    for (const file of FILES) {
      const parts = file.path.split('/');
      let node = TREE;
      for (let i = 0; i < parts.length - 1; i++) {
        if (!node.__dirs[parts[i]]) {
          node.__dirs[parts[i]] = { __files: [], __dirs: {} };
        }
        node = node.__dirs[parts[i]];
      }
      node.__files.push(file);
    }
  }

  function renderStats() {
    const totalSize = FILES.reduce((s, f) => s + f.size, 0);
    const types = {};
    FILES.forEach(f => { types[f.type] = (types[f.type] || 0) + 1; });
    document.getElementById('topbarStats').innerHTML = `
      <span><span class="stat-num">${FILES.length}</span> files</span>
      <span><span class="stat-num">${formatSize(totalSize)}</span> total</span>
    `;
  }

  function renderTree(filter = '') {
    const container = document.getElementById('treeContainer');
    const filterLower = filter.toLowerCase();
    let html = '';

    if (filter) {
      const matches = FILES.filter(f =>
        f.path.toLowerCase().includes(filterLower) || f.name.toLowerCase().includes(filterLower)
      );
      matches.sort((a, b) => {
        const aIdx = a.name.toLowerCase().indexOf(filterLower);
        const bIdx = b.name.toLowerCase().indexOf(filterLower);
        if (aIdx !== bIdx) return aIdx - bIdx;
        return a.path.localeCompare(b.path);
      });
      for (const file of matches.slice(0, 200)) {
        html += renderFileItem(file, 0, true);
      }
      if (matches.length > 200) {
        html += `<div style="padding: 8px 16px; color: var(--text-muted); font-size: 0.82rem;">...and ${matches.length - 200} more</div>`;
      }
      if (matches.length === 0) {
        html += `<div style="padding: 16px; color: var(--text-muted); text-align: center;">No files found</div>`;
      }
    } else {
      html = renderTreeNode(TREE, '', 0);
    }

    container.innerHTML = html;
  }

  function renderTreeNode(node, parentPath, depth) {
    let html = '';
    const dirNames = Object.keys(node.__dirs).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
    const files = [...node.__files].sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));

    for (const dirName of dirNames) {
      const dirPath = parentPath ? parentPath + '/' + dirName : dirName;
      const isOpen = expandedDirs.has(dirPath);
      html += `<div class="tree-item tree-dir" onclick="toggleDir('${escapeAttr(dirPath)}')" style="padding-left: ${16 + depth * 16}px;">
        <span class="dir-chevron ${isOpen ? 'open' : ''}">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 011.06 0l4.25 4.25a.75.75 0 010 1.06l-4.25 4.25a.75.75 0 01-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 010-1.06z"/></svg>
        </span>
        <span class="icon">${isOpen ? '📂' : '📁'}</span>
        <span class="name">${escapeHtml(dirName)}</span>
      </div>`;
      if (isOpen) {
        html += renderTreeNode(node.__dirs[dirName], dirPath, depth + 1);
      }
    }

    for (const file of files) {
      html += renderFileItem(file, depth);
    }

    return html;
  }

  function renderFileItem(file, depth, showPath = false) {
    const isActive = currentPath === file.path;
    const label = showPath ? `<span class="name" title="${escapeAttr(file.path)}">${escapeHtml(file.name)}<span style="color:var(--text-muted);margin-left:6px;font-size:0.78rem;">${escapeHtml(file.dir)}</span></span>` : `<span class="name">${escapeHtml(file.name)}</span>`;
    const paddingLeft = showPath ? 16 : 16 + depth * 16 + 18;
    return `<div class="tree-item tree-file type-${file.type} ${isActive ? 'active' : ''}" onclick="openFile('${escapeAttr(file.path)}')" style="padding-left: ${paddingLeft}px;" title="${escapeAttr(file.path)}">
      <span class="icon">${getFileIcon(file)}</span>
      ${label}
    </div>`;
  }

  function getFileIcon(file) {
    const icons = {
      image: '🖼️', audio: '🎵', video: '🎬', pdf: '📕',
      font: '🔤', binary: '📦', text: '📄'
    };
    return icons[file.type] || '📄';
  }

  window.toggleDir = function(dirPath) {
    if (expandedDirs.has(dirPath)) {
      expandedDirs.delete(dirPath);
    } else {
      expandedDirs.add(dirPath);
    }
    renderTree(document.getElementById('searchInput').value);
  };

  window.openFile = function(filePath) {
    currentPath = filePath;
    location.hash = encodeURIComponent(filePath);
  };

  window.navigateDir = function(dirPath) {
    if (dirPath) {
      const parts = dirPath.split('/');
      let accumulated = '';
      for (const part of parts) {
        accumulated = accumulated ? accumulated + '/' + part : part;
        expandedDirs.add(accumulated);
      }
    }
    currentPath = null;
    showDirectory(dirPath);
    renderTree(document.getElementById('searchInput').value);
  };

  function handleHashNavigation() {
    const hash = decodeURIComponent(location.hash.slice(1));
    if (!hash) {
      showWelcome();
      return;
    }

    const file = FILES.find(f => f.path === hash);
    if (file) {
      currentPath = file.path;
      const parts = file.dir.split('/').filter(Boolean);
      let accumulated = '';
      for (const part of parts) {
        accumulated = accumulated ? accumulated + '/' + part : part;
        expandedDirs.add(accumulated);
      }
      renderTree(document.getElementById('searchInput').value);
      showFile(file);
      closeMobileSidebar();
    } else {
      showDirectory(hash);
    }
  }

  function showWelcome() {
    renderBreadcrumb('');
    document.getElementById('viewer').innerHTML = `
      <div class="welcome">
        <svg width="64" height="64" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0113.25 16h-9.5A1.75 1.75 0 012 14.25Zm1.75-.25a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 00.25-.25V6h-2.75A1.75 1.75 0 019 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>
        <h2>Welcome to File Viewer</h2>
        <p>Select a file from the sidebar to preview it, or use the search bar to find files.</p>
      </div>`;
  }

  function showDirectory(dirPath) {
    renderBreadcrumb(dirPath);
    let node = TREE;
    if (dirPath) {
      const parts = dirPath.split('/');
      for (const part of parts) {
        if (node.__dirs[part]) {
          node = node.__dirs[part];
        } else {
          document.getElementById('viewer').innerHTML =
            `<div class="error-msg">Directory not found: ${escapeHtml(dirPath)}</div>`;
          return;
        }
      }
    }

    const dirs = Object.keys(node.__dirs).sort();
    const files = [...node.__files].sort((a, b) => a.name.localeCompare(b.name));

    let html = '<div class="viewer-inner fade-in"><div class="dir-listing">';
    html += `<div class="dir-listing-header"><span>${dirs.length} directories, ${files.length} files</span></div>`;

    if (dirPath) {
      const parentDir = dirPath.includes('/') ? dirPath.substring(0, dirPath.lastIndexOf('/')) : '';
      html += `<div class="dir-listing-row is-dir" onclick="navigateDir('${escapeAttr(parentDir)}')">
        <span class="row-icon">📁</span>
        <span class="row-name">..</span>
        <span class="row-size"></span>
        <span class="row-type"></span>
      </div>`;
    }

    for (const d of dirs) {
      const fullDir = dirPath ? dirPath + '/' + d : d;
      html += `<div class="dir-listing-row is-dir" onclick="navigateDir('${escapeAttr(fullDir)}')">
        <span class="row-icon">📁</span>
        <span class="row-name">${escapeHtml(d)}</span>
        <span class="row-size"></span>
        <span class="row-type">dir</span>
      </div>`;
    }

    for (const f of files) {
      html += `<div class="dir-listing-row" onclick="openFile('${escapeAttr(f.path)}')">
        <span class="row-icon">${getFileIcon(f)}</span>
        <span class="row-name">${escapeHtml(f.name)}</span>
        <span class="row-size">${formatSize(f.size)}</span>
        <span class="row-type">${escapeHtml(f.ext)}</span>
      </div>`;
    }

    html += '</div></div>';
    document.getElementById('viewer').innerHTML = html;
  }

  function showFile(file) {
    renderBreadcrumb(file.path);

    const fileUrl = BASE_URL + file.path;
    const rawUrl = fileUrl;

    let headerHtml = `<div class="file-header">
      <div class="file-header-info">
        <span class="file-icon">${getFileIcon(file)}</span>
        <span class="file-name">${escapeHtml(file.name)}</span>
        <span class="file-meta">${formatSize(file.size)}</span>
      </div>
      <div class="file-header-actions">
        <a class="btn" href="${escapeAttr(rawUrl)}" target="_blank" download="${escapeAttr(file.name)}">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 011 12.25v-2.5a.75.75 0 011.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 00.25-.25v-2.5a.75.75 0 011.5 0v2.5A1.75 1.75 0 0113.25 14zM7.25 7.689V2a.75.75 0 011.5 0v5.689l1.97-1.969a.749.749 0 111.06 1.06l-3.25 3.25a.749.749 0 01-1.06 0L4.22 6.78a.749.749 0 111.06-1.06l1.97 1.969z"/></svg>
          Download
        </a>
        <a class="btn" href="${escapeAttr(rawUrl)}" target="_blank">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3.75 2h3.5a.75.75 0 010 1.5h-3.5a.25.25 0 00-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-3.5a.75.75 0 011.5 0v3.5A1.75 1.75 0 0112.25 14h-8.5A1.75 1.75 0 012 12.25v-8.5C2 2.784 2.784 2 3.75 2zm6.854-1h4.146a.25.25 0 01.25.25v4.146a.25.25 0 01-.427.177L13.03 4.03 9.28 7.78a.751.751 0 01-1.042-.018.751.751 0 01-.018-1.042l3.75-3.75-1.543-1.543A.25.25 0 0110.604 1z"/></svg>
          Raw
        </a>
      </div>
    </div>`;

    const viewer = document.getElementById('viewer');

    switch (file.type) {
      case 'image':
        viewer.innerHTML = `<div class="viewer-inner fade-in">${headerHtml}
          <div class="media-viewer">
            <img class="zoomable-img" src="${escapeAttr(rawUrl)}" alt="${escapeAttr(file.name)}" loading="lazy" onclick="zoomImage(this)" />
          </div>
        </div>`;
        break;

      case 'audio':
        viewer.innerHTML = `<div class="viewer-inner fade-in">${headerHtml}
          <div class="media-viewer">
            <audio controls preload="metadata" style="width:100%;max-width:600px;">
              <source src="${escapeAttr(rawUrl)}">
              Your browser does not support the audio element.
            </audio>
          </div>
        </div>`;
        break;

      case 'video':
        viewer.innerHTML = `<div class="viewer-inner fade-in">${headerHtml}
          <div class="media-viewer">
            <video controls preload="metadata" style="max-width:100%;max-height:calc(100vh - 280px);">
              <source src="${escapeAttr(rawUrl)}">
              Your browser does not support the video element.
            </video>
          </div>
        </div>`;
        break;

      case 'pdf':
        viewer.innerHTML = `<div class="viewer-inner fade-in">${headerHtml}
          <div class="media-viewer">
            <iframe src="${escapeAttr(rawUrl)}" title="${escapeAttr(file.name)}"></iframe>
          </div>
        </div>`;
        break;

      case 'font':
        showFontPreview(file, rawUrl, headerHtml);
        break;

      case 'binary':
        viewer.innerHTML = `<div class="viewer-inner fade-in">${headerHtml}
          <div class="binary-info">
            <div class="binary-icon">📦</div>
            <h3>Binary File</h3>
            <p>This file cannot be previewed in the browser. Use the download button above to save it locally.</p>
            <p style="font-size:0.82rem;color:var(--text-muted);">${escapeHtml(file.ext)} • ${formatSize(file.size)}</p>
          </div>
        </div>`;
        break;

      case 'text':
      default:
        showTextFile(file, rawUrl, headerHtml);
        break;
    }
  }

  async function showTextFile(file, rawUrl, headerHtml) {
    const viewer = document.getElementById('viewer');
    viewer.innerHTML = `<div class="viewer-inner fade-in">${headerHtml}
      <div class="code-viewer"><div class="loading"><div class="spinner"></div>Loading...</div></div>
    </div>`;

    try {
      const res = await fetch(rawUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const lines = text.split('\n');

      const MAX_INITIAL = 500;
      const codeViewer = viewer.querySelector('.code-viewer');

      let tableHtml = '<table class="code-table"><tbody>';
      const renderCount = Math.min(lines.length, MAX_INITIAL);

      for (let i = 0; i < renderCount; i++) {
        tableHtml += `<tr id="L${i + 1}">
          <td class="line-num" data-line="${i + 1}" onclick="highlightLine(${i + 1})">${i + 1}</td>
          <td class="line-content">${escapeHtml(lines[i])}</td>
        </tr>`;
      }

      tableHtml += '</tbody></table>';
      codeViewer.innerHTML = tableHtml;

      // Lazy load remaining lines
      if (lines.length > MAX_INITIAL) {
        const tbody = codeViewer.querySelector('tbody');
        let loaded = MAX_INITIAL;
        const CHUNK = 500;

        const loadMore = () => {
          const end = Math.min(loaded + CHUNK, lines.length);
          let fragment = '';
          for (let i = loaded; i < end; i++) {
            fragment += `<tr id="L${i + 1}">
              <td class="line-num" data-line="${i + 1}" onclick="highlightLine(${i + 1})">${i + 1}</td>
              <td class="line-content">${escapeHtml(lines[i])}</td>
            </tr>`;
          }
          tbody.insertAdjacentHTML('beforeend', fragment);
          loaded = end;
          if (loaded < lines.length) {
            requestIdleCallback(loadMore);
          }
        };

        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadMore);
        } else {
          setTimeout(loadMore, 100);
        }
      }
    } catch (err) {
      viewer.querySelector('.code-viewer').innerHTML =
        `<div class="error-msg">Error loading file: ${err.message}</div>`;
    }
  }

  function showFontPreview(file, rawUrl, headerHtml) {
    const viewer = document.getElementById('viewer');
    const fontName = 'preview-font-' + Math.random().toString(36).slice(2);
    const fontFace = new FontFace(fontName, `url(${rawUrl})`);

    viewer.innerHTML = `<div class="viewer-inner fade-in">${headerHtml}
      <div class="font-preview">
        <div class="loading"><div class="spinner"></div>Loading font...</div>
      </div>
    </div>`;

    fontFace.load().then(loaded => {
      document.fonts.add(loaded);
      const pangram = 'The quick brown fox jumps over the lazy dog';
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()';
      const sizes = [12, 16, 20, 24, 32, 48];

      let html = `<div class="font-preview-sample" style="font-family: '${fontName}', sans-serif;">${pangram}</div>`;
      html += `<div style="font-family:'${fontName}',sans-serif; font-size:1.5rem; color:var(--text-secondary); margin-bottom:24px; word-break:break-all;">${chars}</div>`;
      html += '<div class="font-preview-sizes">';
      for (const size of sizes) {
        html += `<div class="font-size-row">
          <span class="font-size-label">${size}px</span>
          <span style="font-family: '${fontName}', sans-serif; font-size: ${size}px; line-height: 1.4;">${pangram}</span>
        </div>`;
      }
      html += '</div>';

      viewer.querySelector('.font-preview').innerHTML = html;
    }).catch(err => {
      viewer.querySelector('.font-preview').innerHTML =
        `<div class="error-msg">Could not load font: ${err.message}</div>`;
    });
  }

  function renderBreadcrumb(filePath) {
    const bc = document.getElementById('breadcrumb');
    if (!filePath) {
      bc.innerHTML = '<span class="breadcrumb-current">root</span>';
      return;
    }

    const parts = filePath.split('/');
    let html = `<span class="breadcrumb-item" onclick="navigateDir('')">root</span>`;

    for (let i = 0; i < parts.length; i++) {
      html += `<span class="breadcrumb-sep">/</span>`;
      if (i === parts.length - 1) {
        html += `<span class="breadcrumb-current">${escapeHtml(parts[i])}</span>`;
      } else {
        const dirPath = parts.slice(0, i + 1).join('/');
        html += `<span class="breadcrumb-item" onclick="navigateDir('${escapeAttr(dirPath)}')">${escapeHtml(parts[i])}</span>`;
      }
    }

    bc.innerHTML = html;
  }

  window.highlightLine = function(num) {
    document.querySelectorAll('.code-table tr.highlighted').forEach(el => el.classList.remove('highlighted'));
    document.querySelectorAll('.code-table .line-num.highlighted-num').forEach(el => el.classList.remove('highlighted-num'));
    const row = document.getElementById('L' + num);
    if (row) {
      row.classList.add('highlighted');
      row.querySelector('.line-num').classList.add('highlighted-num');
    }
  };

  window.zoomImage = function(img) {
    const overlay = document.createElement('div');
    overlay.className = 'img-zoomed';
    overlay.onclick = () => overlay.remove();
    const zoomed = document.createElement('img');
    zoomed.src = img.src;
    overlay.appendChild(zoomed);
    document.body.appendChild(overlay);
  };

  function setupSearch() {
    const input = document.getElementById('searchInput');
    input.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        renderTree(input.value.trim());
      }, 150);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        input.value = '';
        renderTree('');
      }
    });

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        input.focus();
        input.select();
      }
    });
  }

  function setupResize() {
    const handle = document.getElementById('resizeHandle');
    const sidebar = document.getElementById('sidebar');
    let startX, startWidth;

    handle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      startX = e.clientX;
      startWidth = sidebar.offsetWidth;
      handle.classList.add('active');
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    function onMouseMove(e) {
      const diff = e.clientX - startX;
      const newWidth = Math.max(200, Math.min(600, startWidth + diff));
      sidebar.style.width = newWidth + 'px';
    }

    function onMouseUp() {
      handle.classList.remove('active');
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    }
  }

  window.collapseSidebar = function() {
    const sidebar = document.getElementById('sidebar');
    sidebar.style.display = sidebar.style.display === 'none' ? '' : 'none';
  };

  window.toggleMobileSidebar = function() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('mobile-open');
  };

  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('mobile-open');
  }

  function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return str.replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  init();
})();
</script>
</body>
